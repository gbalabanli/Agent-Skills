<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Design to Code Annotator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Design to Code Annotator</h1>
    <p>Upload screens, draw regions, describe behavior, export JSON and markdown.</p>
  </header>

  <main class="layout">
    <aside class="panel left">
      <section>
        <h2>Project</h2>
        <label>Project ID <input id="projectId" value="project-ui-flow"></label>
        <label>Project Title <input id="projectTitle" value="UI Flow Annotation"></label>
        <label>Feature Summary <textarea id="featureSummary" rows="3">Describe the flow and expected user outcome.</textarea></label>
      </section>

      <section>
        <h2>Screens</h2>
        <input id="uploadScreens" type="file" accept="image/*" multiple>
        <div id="screenList" class="screen-list"></div>
      </section>

      <section class="actions">
        <button id="exportJsonBtn" type="button">Export JSON</button>
        <button id="exportMdBtn" type="button">Export Markdown</button>
      </section>
    </aside>

    <section class="workspace">
      <div id="stage" class="stage">
        <img id="screenImage" alt="Selected screen">
        <div id="overlayLayer" class="overlay-layer"></div>
        <div id="draftRect" class="draft-rect hidden"></div>
        <div id="emptyState" class="empty">Upload at least one screenshot to begin.</div>
      </div>
      <p class="hint">Draw: click and drag on the image. Edit: click an existing annotation box.</p>
    </section>

    <aside class="panel right">
      <h2>Annotation</h2>
      <form id="annotationForm">
        <input id="annotationId" type="hidden">
        <label>Label <input id="label" required></label>
        <label>Description <textarea id="description" rows="2" required></textarea></label>
        <label>Interaction Type
          <select id="interactionType" required>
            <option value="click">click</option>
            <option value="tap">tap</option>
            <option value="input">input</option>
            <option value="hover">hover</option>
            <option value="scroll">scroll</option>
            <option value="view">view</option>
            <option value="submit">submit</option>
            <option value="navigate">navigate</option>
            <option value="custom">custom</option>
          </select>
        </label>
        <label>Expected Result <textarea id="expectedResult" rows="2" required></textarea></label>
        <label>Target Screen
          <select id="targetScreenId">
            <option value="">None</option>
          </select>
        </label>
        <label>Component Hint <input id="componentHint" required></label>
        <label>Development Notes <textarea id="developmentNotes" rows="2" required></textarea></label>
        <label>Priority
          <select id="priority" required>
            <option value="high">high</option>
            <option value="medium" selected>medium</option>
            <option value="low">low</option>
          </select>
        </label>
        <div class="form-actions">
          <button type="submit" id="saveBtn">Save Annotation</button>
          <button type="button" id="deleteBtn" disabled>Delete</button>
          <button type="button" id="clearBtn">Clear</button>
        </div>
      </form>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
